<!DOCTYPE html>
<html>
<head> 
  <link rel="stylesheet" href="style.css">
  <title>Luxury Property Dealer</title>
  <link rel="stylesheet" href="style.css">
<head>
  <style>
     text-align: center;
      padding: 50px;
      background: rgba(0,0,0,0.5);
      color: white;
      border-radius: 15px;
    }

    .slider-container img {
      width: 100%;
      height: auto;
      border-radius: 15px;
    }

    button {
      padding: 12px 25px;
      margin-top: 10px;
      border-radius: 30px;
      border: none;
      background: gold;
      color: black;
      font-weight: bold;
    }
    
  </style>
</head>

<body>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-content">
    <h1>Luxury Property Dealer</h1>
    <p>Find Your Dream Home</p>
  </div>
</section>

<!-- SLIDER -->
  <script>
let slides = document.querySelectorAll('.slide');
let current = 0;

function showSlide(index) {
  slides.forEach((s,i)=> s.style.display = (i===index)?'block':'none');
}

setInterval(()=>{
  current = (current+1)%slides.length;
  showSlide(current);
}, 3000);

showSlide(current);
  </script>
<div class="slider-container">

  <div class="slide active">
    <img src="images/villa1.jpg" alt="Villa">
    <div class="slide-content">
      <h2>Luxury Villa</h2>
      <p>₹1.2 Cr • Meerut</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

  <div class="slide">
    <img src="images/apartment1.jpg" alt="Apartment">
    <div class="slide-content">
      <h2>Modern Apartment</h2>
      <p>₹45 Lakh • Delhi NCR</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

</div>

</body>
</html>
