ok<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Properties</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  
  /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}

body {
  background: #f5f5f5;
  color: #333;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
}

header .logo {
  font-size: 24px;
  font-weight: bold;
}

header nav a {
  color: #fff;
  margin-left: 20px;
  text-decoration: none;
  font-weight: 500;
}

header nav a:hover {
  color: #ffcc00;
}

/* Slider */
.slider {
  position: relative;
  overflow: hidden;
  max-height: 500px;
}

.slides {
  display: flex;
  width: 300%;
  animation: slide 12s infinite;
}

.slides img {
  width: 100%;
  height: 500px;
  object-fit: cover;
}

/* Slider Animation */
@keyframes slide {
  0% { transform: translateX(0%); }
  33% { transform: translateX(-100%); }
  66% { transform: translateX(-200%); }
  100% { transform: translateX(0%); }
}

/* Listings */
.listings {
  padding: 60px 20px;
  text-align: center;
  background: #fff;
}

.property-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: #f0f0f0;
  width: 300px;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
  color: #333;
}

.card p {
  color: #555;
  margin-bottom: 10px;
}

/* Contact */

  
</head>
<body>

  <!-- Header / Logo -->
  <header>
    <div class="logo">🏰 Luxury Properties</div>
    <nav>
      <a href="#home">Home</a>
      <a href="#listings">Listings</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Slider -->
  <section class="slider">
    <div class="slides">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80">
      <img src="https://images.unsplash.com/photo-1600585154341-b4e8a1a2a4f1" alt="Villa 2">
      <img src="https://images.unsplash.com/photo-1600585154342-1d9c4f7d6a3b" alt="Villa 3">
    </div>
  </section>

  <!-- Listings -->
  <section id="listings" class="listings">
    <h2>Our Premium Listings</h2>
    <div class="property-cards">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Property 1">
        <h3>Modern Villa</h3>
        <p>Location: Beverly Hills</p>
        <p>Price: $2,500,000</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154341-b4e8a1a2a4f1" alt="Property 2">
        <h3>Luxury Apartment</h3>
        <p>Location: Manhattan</p>
        <p>Price: $1,200,000</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154342-1d9c4f7d6a3b" alt="Property 3">
        <h3>Beach House</h3>
        <p>Location: Miami</p>
        <p>Price: $3,000,000</p>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/mayznrvl" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="_replyto" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Luxury Properties. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <header>
  <div class="logo">🏰 Luxury</div>

  <div class="menu-toggle" id="menu-toggle">
    <i class="fas fa-bars"></i>
  </div>

  <nav id="nav">
    <a href="#home">Home</a>
    <a href="#listings">Listings</a>
    <a href="#contact">Contact</a>
  </nav>
</header>
</body>
</html>
