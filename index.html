<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Property Dealer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0c10;
  color: white;
}

header {
  background: black;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  letter-spacing: 2px;
}

.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  background: rgba(0,0,0,0.6);
  padding: 20px;
}

.section {
  padding: 30px;
  text-align: center;
}

.properties {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1f2833;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

.card h3 {
  padding: 10px;
}

button {
  background: gold;
  border: none;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}

.contact {
  background: #111;
  padding: 20px;
}

input, textarea {
  width: 90%;
  padding: 10px;
  margin: 10px;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}
</style>
</head>

<body>

<header>Luxury Property Dealer</header>

<div class="hero">
  <h1>Find Your Dream Home</h1>
</div>

<div class="section">
  <h2>Featured Properties</h2>

  <div class="properties">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
      <h3>Luxury Villa - ₹1.2 Cr</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
      <h3>Modern Flat - ₹60 Lakh</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d">
      <h3>Premium House - ₹90 Lakh</h3>
    </div>

  </div>
</div>

<div class="contact">
  <h2>Contact Us</h2>
  <input type="text" placeholder="Your Name"><br>
  <input type="text" placeholder="Phone Number"><br>
  <textarea placeholder="Message"></textarea><br>
  <button>Send</button>
</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

</body>
</html>
