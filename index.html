<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Property Dealer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>Luxury <span>Property</span> Dealer</h1>
      <p>Find Your Dream Home in Meerut</p>
      <div class="buttons">
        <a href="#" class="btn">Explore Properties</a>
        <a href="https://wa.me/91XXXXXXXXXX" class="btn whatsapp">Book on WhatsApp</a>
      </div>
    </div>
  </section>

  <!-- SLIDER -->
  <div class="slider-container">
    <div class="slide active">
      <img src="images/villa1.jpg" alt="Villa">
      <div class="slide-content">
        <h2>Luxury Villa</h2>
        <p>₹1.2 Cr • Meerut</p>
        <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
          Book on WhatsApp
        </button>
      </div>
    </div>

    <div class="slide">
      <img src="images/apartment1.jpg" alt="Apartment">
      <div class="slide-content">
        <h2>Modern Apartment</h2>
        <p>₹45 Lakh • Delhi NCR</p>
        <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
          Book on WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- JS for auto slider -->
  <script>
    let slides = document.querySelectorAll('.slide');
    let current = 0;
    function showSlide(index) {
      slides.forEach((s,i) => s.style.display = (i===index)? 'block' : 'none');
    }
    setInterval(() => {
      current = (current+1) % slides.length;
      showSlide(current);
    }, 3000);
    showSlide(current);
  </script>

</body>
</html>
