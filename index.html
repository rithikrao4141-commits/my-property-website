<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Properties</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🏠 Rr Properties</div>

  <nav>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Listings</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<div class="slide active">
  <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
  <div class="overlay">
    <h2>Modern Villa</h2>
  </div>
</div>

<div class="slide">
  <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d">
  <div class="overlay">
    <h2>Luxury Apartment</h2>
  </div>
</div>

<div class="slide">
  <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
  <div class="overlay">
    <h2>Beach House</h2>
  </div>
</div>

  <div class="controls">
    <span class="prev">&#10094;</span>
    <span class="next">&#10095;</span>
  </div>
  <div class="dots">
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>
</section>

<!-- LISTINGS -->
<section id="listings" class="listings">
  <h2>Premium Properties</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80">
      <h3>Villa</h3>
      <p>₹2.5 Cr - Delhi</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154341-b4e8a1a2a4f1?auto=format&fit=crop&w=800&q=80">
      <h3>Apartment</h3>
      <p>₹1.2 Cr - Noida</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154342-1d9c4f7d6a3b?auto=format&fit=crop&w=800&q=80">
      <h3>Beach House</h3>
      <p>₹3 Cr - Goa</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Get In Touch</h2>

  <div class="contact-box">
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>

    <div class="btns">
      <button class="send-btn">Send</button>

      <a href="https://wa.me/919876543210?text=Hello%20I%20am%20interested%20in%20your%20property" class="whatsapp-btn">
        📲 WhatsApp
      </a>
    </div>
  </div>
</section>
</section>
  

<footer>
  <p>© 2026 Luxury Properties</p>
</footer>

<script src="script.js"></script>
  <script 
    src="https://unpkg.com/aos@2.3.4/dist/aos
    .js"></script>
<script>
AOS.init();
</script>
</body>
  </html>
