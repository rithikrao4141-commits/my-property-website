<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Property Dealer</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1568605114967-8130f3a36994');
  background-size: cover;
  background-position: center;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 40px;
  color: gold;
}

header p {
  font-size: 18px;
}

.btn {
  padding: 10px 20px;
  background: gold;
  color: black;
  border: none;
  margin-top: 10px;
}

.section {
  padding: 30px;
}

.properties {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
}

.card-content {
  padding: 15px;
}

.contact input, .contact textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
}

.contact button {
  width: 100%;
  padding: 10px;
  background: gold;
  border: none;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Luxury Property Dealer</h1>
    <p>Find Your Dream Home Today</p>
    <button class="btn">Explore Properties</button>
  </div>
</header>

<section class="section">
<h2>Featured Properties</h2>

<div class="properties">

<div class="card">
<img src="https://images.unsplash.com/photo-1572120360610-d971b9d7767c">
<div class="card-content">
<h3>Modern Villa</h3>
<p>Location: Noida</p>
<p>₹1.5 Crore</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<div class="card-content">
<h3>Luxury Apartment</h3>
<p>Location: Delhi</p>
<p>₹80 Lakhs</p>
</div>
</div>

</div>
</section>

<section class="section contact">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name">
<input type="text" placeholder="Phone Number">
<textarea placeholder="Message"></textarea>
<button>Send Message</button>
</form>

</section>

</body>
</html>
