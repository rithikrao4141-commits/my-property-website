<!DOCTYPE html>
<html lang="en">
<head> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Property Dealer</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1568605114967-8130f3a36994');
  background-size: cover;
  background-position: center;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
header h1 {
  font-size: 45px;
  color: gold;
  text-shadow: 0 0 10px rgba(255,215,0,0.7);
}

.btn {
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: black;
  color: gold;
  border: 1px solid gold;
}
header h1 {
  font-size: 40px;
  color: gold;
}
h2 {
  color: gold;
  text-align: center;
  margin-bottom: 20px;
}

h3 {
  color: white;
  font-size: 20px;
}

p {
  color: #ccc;
  font-size: 14px;
}
.card {
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(255,215,0,0.3);
}
.card {
  box-shadow: 0 5px 20px rgba(255,215,0,0.2);
  border: 1px solid rgba(255,215,0,0.2);
}
.whatsapp:hover {
  transform: scale(1.1);
}

.call:hover {
  transform: scale(1.1);
}
.card:hover {
  transform: scale(1.03);
}
header p {
  font-size: 18px;
}

.btn {
  padding: 10px 20px;
  background: gold;
  color: black;
  border: none;
  margin-top: 10px;
}

.section {
  padding: 30px;
}
  
.properties {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}


.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}
.card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
}
.contact input, .contact textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
}

.contact button {
  width: 100%;
  padding: 10px;
  background: gold;
  border: none;
}
</style>
</head>

<body>

<header>
<div class="slider-container">

  <div class="slide active">
    <img src="property1.jpg" alt="Property 1">
    <div class="slide-content">
      <h2>Luxury Villa</h2>
      <p>₹1.2 Cr • Meerut</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

  <div class="slide">
    <img src="property2.jpg" alt="Property 2">
    <div class="slide-content">
      <h2>Modern Apartment</h2>
      <p>₹45 Lakh • Delhi NCR</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

  <div class="slide">
    <img src="property3.jpg" alt="Property 3">
    <div class="slide-content">
      <h2>Luxury Farmhouse</h2>
      <p>₹2.5 Cr • Outskirts</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

</div>
  <div>
    <h1>Luxury Property Dealer</h1>
    <p>Find Your Dream Home Today</p>
    <button class="btn">Explore Properties</button>
  </div>
</header>

<section class="section">
<h2>Featured Properties</h2>

<div class="properties">

<div class="card">
<img src="https://images.unsplash.com/photo-1572120360610-d971b9d7767c">
<div class="card-content">
<h3>Modern Villa</h3>
<p>Location: Noida</p>
<p>₹1.5 Crore</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<div class="card-content">
<h3>Luxury Apartment</h3>
<p>Location: Delhi</p>
<p>₹80 Lakhs</p>
</div>
</div>

</div>
</section>

<section class="section contact">
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name">
<input type="text" placeholder="Phone Number">
<textarea placeholder="Message"></textarea>
<button>Send Message</button>
</form>

</section>

 <!-- WhatsApp Button -->
<a href="https://wa.me/91XXXXXXXXXX" target="_blank" class="whatsapp">
  💬
</a>

<!-- Call Button -->
<a href="tel:XXXXXXXXXX" class="call">
  📞
</a>

<style>
.whatsapp, .call {
  position: fixed;
  right: 15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
}

.whatsapp {
  bottom: 80px;
  background: #25D366;
}

.call {
  bottom: 20px;
  background: #007bff;
}
</style></body>
</html>
