<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <title>Luxury Property Dealer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      background: black;
    }

    .hero {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
    }
  </style>
</head>

<body>

<header>Luxury Property Dealer</header>

<div class="hero">
  Find Your Dream Home
</div>

<div class="section">
  <h2>Properties</h2>

  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1572120360610-d971b9d7767c">
      <h3>Villa</h3>
      <p>₹50 Lakh</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <h3>Apartment</h3>
      <p>₹30 Lakh</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Contact Us</h2>
  <button>Call Now</button>
</div>

<footer>© 2026 Property Dealer</footer>

</body>
</html>
