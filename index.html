<!DOCTYPE html>
<html>
<head>
  <title>Luxury Property Dealer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-content">
    <h1>Luxury Property Dealer</h1>
    <p>Find Your Dream Home</p>
  </div>
</section>

<!-- SLIDER -->
<div class="slider-container">

  <div class="slide active">
    <img src="images/villa1.jpg" alt="Villa">
    <div class="slide-content">
      <h2>Luxury Villa</h2>
      <p>₹1.2 Cr • Meerut</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

  <div class="slide">
    <img src="images/apartment1.jpg" alt="Apartment">
    <div class="slide-content">
      <h2>Modern Apartment</h2>
      <p>₹45 Lakh • Delhi NCR</p>
      <button onclick="window.location.href='https://wa.me/91XXXXXXXXXX'">
        Book on WhatsApp
      </button>
    </div>
  </div>

</div>

</body>
</html>
