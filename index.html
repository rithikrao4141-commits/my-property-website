<!DOCTYPE html>
<html>
<head>
<title>Property Dealer</title>
<style>
body { font-family: Arial; margin: 0; }
header { background: black; color: white; padding: 15px; text-align: center; }
section { padding: 20px; }
.property { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
</style>
</head>

<body>

<header>
<h1>Luxury Property Dealer</h1>
<p>Find Your Dream Property</p>
</header>

<section>
<h2>Properties</h2>

<div class="property">
<h3>3BHK Flat</h3>
<p>Location: Delhi</p>
<p>Price: ₹50 Lakhs</p>
</div>

<div class="property">
<h3>Villa</h3>
<p>Location: Noida</p>
<p>Price: ₹1.2 Crore</p>
</div>

</section>

<section>
<h2>Contact Us</h2>

<form>
<input type="text" placeholder="Your Name"><br><br>
<input type="text" placeholder="Phone Number"><br><br>
<textarea placeholder="Message"></textarea><br><br>
<button>Send</button>
</form>

</section>

</body>
</html>
