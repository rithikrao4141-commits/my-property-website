<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Properties</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Header / Logo -->
  <header>
    <div class="logo">🏰 Luxury Properties</div>
    <nav>
      <a href="#home">Home</a>
      <a href="#listings">Listings</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Slider -->
  <section class="slider">
    <div class="slides">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Villa 1">
      <img src="https://images.unsplash.com/photo-1600585154341-b4e8a1a2a4f1" alt="Villa 2">
      <img src="https://images.unsplash.com/photo-1600585154342-1d9c4f7d6a3b" alt="Villa 3">
    </div>
  </section>

  <!-- Listings -->
  <section id="listings" class="listings">
    <h2>Our Premium Listings</h2>
    <div class="property-cards">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Property 1">
        <h3>Modern Villa</h3>
        <p>Location: Beverly Hills</p>
        <p>Price: $2,500,000</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154341-b4e8a1a2a4f1" alt="Property 2">
        <h3>Luxury Apartment</h3>
        <p>Location: Manhattan</p>
        <p>Price: $1,200,000</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154342-1d9c4f7d6a3b" alt="Property 3">
        <h3>Beach House</h3>
        <p>Location: Miami</p>
        <p>Price: $3,000,000</p>
      </div>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/mayznrvl" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="_replyto" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Luxury Properties. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
